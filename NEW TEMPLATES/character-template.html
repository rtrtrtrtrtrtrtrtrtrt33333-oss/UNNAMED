<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-text="--page-title">Character Template</title>

    <script src="../00_code/shared/content-loaders/00_content-loader.js"></script>

    <link rel="stylesheet" href="character-template-data.css">
    <link rel="stylesheet" href="character-template.css">
</head>
<body>
    <main class="character-page">
        <section class="character-hero">
            <div class="hero-image-frame">
                <img class="hero-image" data-link="--hero-image" alt="">
            </div>

            <div class="hero-content">
                <span class="character-type" data-text="--character-type">Character Type</span>
                <h1 data-text="--character-name">Character Name</h1>
                <p class="hero-description" data-text="--hero-description">Short character description.</p>
            </div>
        </section>

        <section class="character-body">
            <article class="character-section">
                <h2 data-text="--section-1-title">Overview</h2>
                <p data-text="--section-1-text-1">First paragraph.</p>
                <p data-text="--section-1-text-2">Second paragraph.</p>
            </article>

            <aside class="character-note">
                <p data-text="--quote">Character quote.</p>
                <span data-text="--quote-author">Quote author</span>
            </aside>
        </section>

        <section class="character-gallery">
            <img data-link="--gallery-1" alt="">
            <img data-link="--gallery-2" alt="">
            <img data-link="--gallery-3" alt="">
        </section>
    </main>
</body>
</html>
